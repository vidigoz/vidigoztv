<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VidigozTV — Enlaces</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #050410;
    font-family: 'Manrope', system-ui, sans-serif;
    display: flex;
    justify-content: center;
  }
  ::selection { background: #e2632f; color: #fff; }

  .page {
    width: 100%;
    max-width: 460px;
    padding: 40px 20px 56px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .header { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 6px; }
  .avatar {
    width: 84px; height: 84px; border-radius: 50%;
    background: #2a2748;
    box-shadow: 0 0 0 3px rgba(226,99,47,.35);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .brand { font: 700 22px/1 'Space Grotesk', sans-serif; letter-spacing: .24em; color: #f2efe9; }
  .tagline { font: 500 13.5px 'Manrope', sans-serif; color: rgba(255,255,255,.5); text-align: center; }

  .socials { display: flex; gap: 12px; margin-top: 8px; }
  .social {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: transform .2s ease;
  }
  .social:hover { transform: scale(1.1); }
  .social:active { transform: scale(.94); }
  .social.fb { background: #1877f2; }
  .social.ig { background: linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7); border-radius: 13px; }
  .social.tt { background: #000; }

  .card {
    background: #16142a;
    border-radius: 18px;
    overflow: hidden;
  }
  .card-head {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 18px;
    cursor: pointer;
    min-height: 44px;
  }
  .card-icon {
    width: 44px; height: 44px; flex: none;
    border-radius: 12px;
    background: #0c0a1c;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .card-icon img { width: 100%; height: 100%; object-fit: cover; }
  .card-title { font: 600 16px 'Space Grotesk', sans-serif; color: #f2efe9; flex: 1; }
  .chevron { color: rgba(255,255,255,.5); font: 600 13px sans-serif; display: inline-block; transition: transform .2s ease; }
  .card.open .chevron { transform: rotate(180deg); }

  .card-body {
    display: none;
    gap: 10px;
    padding: 0 18px 16px;
  }
  .card.open .card-body { display: flex; }

  .card-body.embed { display: none; flex-direction: column; gap: 12px; padding: 0 18px 16px; }
  .card.open .card-body.embed { display: flex; }
  .spotify-embed {
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
  }
  .spotify-embed iframe { display: block; border-radius: 12px; }

  .sub-item {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    background: #0c0a1c;
    border-radius: 14px;
    padding: 14px 10px;
    text-decoration: none;
    min-height: 44px;
    transition: transform .18s ease;
  }
  .sub-item:hover { transform: scale(1.03); }
  .sub-item:active { transform: scale(.97); }
  .sub-icon {
    width: 56px; height: 56px;
    border-radius: 12px;
    overflow: hidden;
    background: #16142a;
    display: flex; align-items: center; justify-content: center;
  }
  .sub-icon img { width: 100%; height: 100%; object-fit: cover; }
  .sub-label { font: 500 12px 'Manrope', sans-serif; color: #e9e5da; text-align: center; line-height: 1.25; }

  .link-row {
    display: flex; align-items: center; gap: 14px;
    background: #16142a;
    border-radius: 18px;
    padding: 16px 18px;
    text-decoration: none;
    min-height: 44px;
    transition: transform .18s ease;
  }
  .link-row:hover { transform: translateX(4px); }
  .link-row:active { transform: scale(.98); }
  .link-title { font: 600 16px 'Space Grotesk', sans-serif; color: #f2efe9; flex: 1; }
  .arrow { color: rgba(255,255,255,.4); font: 600 16px sans-serif; }

  .link-row.cta { background: #e2632f; }
  .cta .card-icon { background: rgba(255,255,255,.18); }
  .cta .link-title { color: #fff; }
  .cta .link-sub { font: 600 11.5px 'Manrope', sans-serif; color: rgba(255,255,255,.85); }
  .link-text { flex: 1; display: flex; flex-direction: column; }

  @keyframes floatIcon { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
  .float { animation: floatIcon 3.4s ease-in-out infinite; }

  .newsletter-card {
    background: #16142a;
    border-radius: 18px;
    padding: 20px 18px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .newsletter-card-title { font: 600 16px 'Space Grotesk', sans-serif; color: #f2efe9; }
  .newsletter-card-sub { font: 500 12.5px 'Manrope', sans-serif; color: rgba(255,255,255,.5); margin-bottom: 10px; }
  .newsletter-form { display: flex; flex-direction: column; gap: 8px; }
  .newsletter-input {
    width: 100%;
    background: #0c0a1c;
    border: 1px solid transparent;
    border-radius: 12px;
    padding: 12px 14px;
    font: 500 14px 'Manrope', sans-serif;
    color: #f2efe9;
    outline: none;
    transition: border-color .2s ease;
  }
  .newsletter-input::placeholder { color: rgba(255,255,255,.35); }
  .newsletter-input:focus { border-color: #e2632f; }
  .newsletter-btn {
    background: #e2632f;
    border: none;
    border-radius: 12px;
    padding: 12px 18px;
    font: 600 13px 'Space Grotesk', sans-serif;
    color: #fff;
    cursor: pointer;
    transition: transform .18s ease, opacity .18s ease;
  }
  .newsletter-btn:hover { transform: scale(1.03); }
  .newsletter-btn:active { transform: scale(.97); }
  .newsletter-btn:disabled { opacity: .6; cursor: default; transform: none; }
  .newsletter-msg { font: 500 12px 'Manrope', sans-serif; min-height: 15px; margin-top: 8px; }
  .newsletter-msg.ok { color: #4eca8b; }
  .newsletter-msg.err { color: #e85454; }
</style>
</head>
<body>

<div class="page">

  <div class="header">
    <div class="avatar">
      <img src="icons/Logo_vidigoztv.jpg" alt="" onerror="this.style.display='none'">
    </div>
    <span class="brand">VIDIGOZTV</span>
    <span class="tagline">Todo mi contenido en un solo lugar</span>

    <div class="socials">
      <a class="social fb" href="https://www.facebook.com/vidigoztv" target="_blank" rel="noopener" aria-label="Facebook" data-track="social_facebook">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M22 12a10 10 0 1 0-11.6 9.9v-7H7.9V12h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.4h-1.3c-1.2 0-1.6.8-1.6 1.6V12h2.8l-.4 2.9h-2.4v7A10 10 0 0 0 22 12"/></svg>
      </a>
      <a class="social ig" href="https://www.instagram.com/vidigoztv/" target="_blank" rel="noopener" aria-label="Instagram" data-track="social_instagram">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1"/></svg>
      </a>
      <a class="social tt" href="https://www.tiktok.com/@vidigoztv" target="_blank" rel="noopener" aria-label="TikTok" data-track="social_tiktok">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M16.5 3c.5 2.3 2 3.8 4.3 4v2.7c-1.6.1-3-.4-4.3-1.3v6.9c0 3.7-3 6.4-6.4 6.4S3.7 19 3.7 15.3c0-3.6 3-6.4 6.6-6.3v2.9c-1.9-.3-3.6 1.1-3.6 3s1.4 3.3 3.3 3.3 3.4-1.4 3.4-3.4V3z"/></svg>
      </a>
    </div>
  </div>

  <!-- Juegos: acordeón -->
  <div class="card open" id="card-juegos">
    <div class="card-head" onclick="toggleCard('card-juegos')">
      <div class="card-icon float">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f2efe9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="10" rx="5"/><line x1="7" y1="10" x2="7" y2="14"/><line x1="5" y1="12" x2="9" y2="12"/><circle cx="15" cy="10.5" r="1"/><circle cx="17.5" cy="13" r="1"/></svg>
      </div>
      <span class="card-title">Juegos</span>
      <span class="chevron">▾</span>
    </div>
    <div class="card-body">
      <a class="sub-item" href="https://sacamuelas.netlify.app/" target="_blank" rel="noopener" data-track="juego_sacamuelas">
        <div class="sub-icon"><img src="icons/barbero.png" alt="" onerror="this.style.display='none'"></div>
        <span class="sub-label">El Sacamuelas</span>
      </a>
      <a class="sub-item" href="https://cerdoicario.netlify.app/" target="_blank" rel="noopener" data-track="juego_cerdoicario">
        <div class="sub-icon"><img src="icons/lanzacerdos.png" alt="" onerror="this.style.display='none'"></div>
        <span class="sub-label">Cerdo Icario</span>
      </a>
    </div>
  </div>

  <!-- Tienda: acordeón -->
  <div class="card" id="card-tienda">
    <div class="card-head" onclick="toggleCard('card-tienda')">
      <div class="card-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f2efe9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8h12l-1 12H7L6 8z"/><path d="M9 8V6a3 3 0 0 1 6 0v2"/></svg>
      </div>
      <span class="card-title">Tienda</span>
      <span class="chevron">▾</span>
    </div>
    <div class="card-body">
      <a class="sub-item" href="https://vidigoztv.printify.me/" target="_blank" rel="noopener" data-track="tienda_merch">
        <div class="sub-icon"><img src="icons/merch.png" alt="" onerror="this.style.display='none'"></div>
        <span class="sub-label">Merch</span>
      </a>
      <a class="sub-item" href="javascript:void(0)" style="opacity:0.5;cursor:default;">
        <div class="sub-icon"><img src="icons/ebook.png" alt="" onerror="this.style.display='none'"></div>
        <span class="sub-label">Libros</span>
        <span style="font:500 10px 'Manrope',sans-serif;color:rgba(255,255,255,.45);">próximamente</span>
      </a>
    </div>
  </div>

  <!-- Musica: acordeón con embed de Spotify -->
  <div class="card" id="card-musica">
    <div class="card-head" onclick="toggleCard('card-musica')">
      <div class="card-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f2efe9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l11-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="17" cy="16" r="3"/></svg>
      </div>
      <span class="card-title">Musica</span>
      <span class="chevron">▾</span>
    </div>
    <div class="card-body embed">
      <div class="spotify-embed">
        <iframe src="https://open.spotify.com/embed/artist/3GVje1dL7jr9lipEPKbXDd?utm_source=generator" width="100%" height="352" frameborder="0" allowfullscreen loading="lazy" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
      </div>
      <div class="spotify-embed">
        <iframe src="https://open.spotify.com/embed/album/1O7cQSmCFjJwOC8vBIj9O2?utm_source=generator" width="100%" height="352" frameborder="0" allowfullscreen loading="lazy" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
      </div>
    </div>
  </div>

  <!-- Historias / CTA principal -->
  <a class="link-row cta" href="historias.html" data-track="cta_historias">
    <div class="card-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    </div>
    <div class="link-text">
      <span class="link-title">TempoVerso → Historias</span>
    </div>
  </a>

  <!-- Newsletter -->
  <div class="newsletter-card">
    <span class="newsletter-card-title">Recibe historias en tu correo</span>
    <span class="newsletter-card-sub">Te avisamos cada vez que hay una historia nueva</span>
    <form class="newsletter-form" id="newsletterForm">
      <input type="text" class="newsletter-input" id="newsletterNombre" placeholder="¿Cómo te llamamos?" required autocomplete="given-name">
      <input type="email" class="newsletter-input" id="newsletterEmail" placeholder="tu@correo.com" required autocomplete="email">
      <button type="submit" class="newsletter-btn" id="newsletterBtn">Suscribirme</button>
    </form>
    <div class="newsletter-msg" id="newsletterMsg"></div>
  </div>

</div>

<script src="analytics.js"></script>
<script>
  function toggleCard(id) {
    const card = document.getElementById(id);
    const opening = !card.classList.contains('open');
    card.classList.toggle('open');
    if (opening && window.vtvTrack) window.vtvTrack(`${id}_expand`);
  }

  const newsletterForm  = document.getElementById('newsletterForm');
  const newsletterNombre = document.getElementById('newsletterNombre');
  const newsletterEmail = document.getElementById('newsletterEmail');
  const newsletterBtn   = document.getElementById('newsletterBtn');
  const newsletterMsg   = document.getElementById('newsletterMsg');

  newsletterForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const nombre = newsletterNombre.value.trim();
    const email = newsletterEmail.value.trim();

    newsletterBtn.disabled = true;
    newsletterBtn.textContent = 'Enviando…';
    newsletterMsg.textContent = '';
    newsletterMsg.className = 'newsletter-msg';

    try {
      const res = await fetch('/.netlify/functions/newsletter', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, nombre, origen: 'index.html' }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

      newsletterMsg.textContent = data.alreadySubscribed
        ? 'Ya estabas suscrito — gracias por seguir aquí.'
        : `¡Listo, ${nombre}! Te avisaremos de cada historia nueva.`;
      newsletterMsg.classList.add('ok');
      if (!data.alreadySubscribed && window.vtvTrack) window.vtvTrack('newsletter_submit');
      newsletterForm.reset();
    } catch (err) {
      console.error('Error en newsletter:', err);
      newsletterMsg.textContent = 'No se pudo completar el registro. Intenta de nuevo.';
      newsletterMsg.classList.add('err');
    } finally {
      newsletterBtn.disabled = false;
      newsletterBtn.textContent = 'Suscribirme';
    }
  });
</script>

</body>
</html>
